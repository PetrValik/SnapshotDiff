name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test (Web + Core + Tests)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'SnapshotDiff.Core/package-lock.json'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore SnapshotDiff.slnx

      - name: Build Core
        run: dotnet build SnapshotDiff.Core/SnapshotDiff.App.csproj --no-restore -c Release

      - name: Build Web
        run: dotnet build SnapshotDiff/SnapshotDiff.csproj --no-restore -c Release

      - name: Build MAUI
        run: dotnet build SnapshotDiff.MAUI/SnapshotDiff.MAUI.csproj --no-restore -c Release -f net10.0-windows10.0.19041.0

      - name: Build Tests
        run: dotnet build SnapshotDiff.Tests/SnapshotDiff.Tests.csproj --no-restore -c Release

      - name: Run Tests
        run: dotnet test SnapshotDiff.Tests/SnapshotDiff.Tests.csproj --no-build -c Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: SnapshotDiff.Tests/TestResults/

  lint-warnings:
    name: Treat warnings as errors (Core)
    runs-on: windows-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'SnapshotDiff.Core/package-lock.json'

      - name: Restore Core
        run: dotnet restore SnapshotDiff.Core/SnapshotDiff.App.csproj

      - name: Build Core (warnings as errors)
        run: dotnet build SnapshotDiff.Core/SnapshotDiff.App.csproj --no-restore -c Release /p:TreatWarningsAsErrors=true
        continue-on-error: true
