name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release-windows:
    name: Publish Windows (MAUI, self-contained)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'SnapshotDiff.Core/package-lock.json'

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore SnapshotDiff.MAUI/SnapshotDiff.MAUI.csproj

      - name: Determine version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $tag = "${{ github.ref_name }}"
            echo "VERSION=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT
          }

      - name: Publish MAUI Windows
        run: |
          dotnet publish SnapshotDiff.MAUI/SnapshotDiff.MAUI.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:ApplicationVersion=${{ steps.version.outputs.VERSION }} `
            /p:ApplicationDisplayVersion=${{ steps.version.outputs.VERSION }} `
            -o publish/windows

      - name: Zip Windows output
        run: Compress-Archive -Path publish/windows/* -DestinationPath SnapshotDiff-${{ steps.version.outputs.VERSION }}-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapshotDiff-windows-x64
          path: SnapshotDiff-${{ steps.version.outputs.VERSION }}-windows-x64.zip

  release-linux:
    name: Publish Linux (Photino, self-contained)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'SnapshotDiff.Core/package-lock.json'

      - name: Restore
        run: dotnet restore SnapshotDiff.Linux/SnapshotDiff.Linux.csproj

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
          fi

      - name: Publish Linux
        run: |
          dotnet publish SnapshotDiff.Linux/SnapshotDiff.Linux.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -o publish/linux

      - name: Tar Linux output
        run: tar -czf SnapshotDiff-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz -C publish/linux .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapshotDiff-linux-x64
          path: SnapshotDiff-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-windows, release-linux]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.{zip,tar.gz}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

    name: Publish MAUI Windows (self-contained)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'SnapshotDiff.Core/package-lock.json'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore SnapshotDiff.MAUI/SnapshotDiff.MAUI.csproj

      - name: Determine version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $tag = "${{ github.ref_name }}"
            echo "VERSION=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT
          }

      - name: Publish MAUI Windows (self-contained)
        run: |
          dotnet publish SnapshotDiff.MAUI/SnapshotDiff.MAUI.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:ApplicationVersion=${{ steps.version.outputs.VERSION }} `
            /p:ApplicationDisplayVersion=${{ steps.version.outputs.VERSION }} `
            -o publish/maui-windows

      - name: Zip MAUI output
        run: Compress-Archive -Path publish/maui-windows/* -DestinationPath SnapshotDiff-${{ steps.version.outputs.VERSION }}-windows-x64.zip

      - name: Upload MAUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapshotDiff-windows-x64
          path: SnapshotDiff-${{ steps.version.outputs.VERSION }}-windows-x64.zip

  release-web:
    name: Publish Web (self-contained)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'SnapshotDiff.Core/package-lock.json'

      - name: Restore
        run: dotnet restore SnapshotDiff/SnapshotDiff.Web.csproj

      - name: Determine version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $tag = "${{ github.ref_name }}"
            echo "VERSION=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT
          }

      - name: Publish Web
        run: |
          dotnet publish SnapshotDiff/SnapshotDiff.Web.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o publish/web

      - name: Zip Web output
        run: Compress-Archive -Path publish/web/* -DestinationPath SnapshotDiff-${{ steps.version.outputs.VERSION }}-web.zip

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapshotDiff-web
          path: SnapshotDiff-${{ steps.version.outputs.VERSION }}-web.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ release-maui-windows, release-web ]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
